<!DOCTYPE html>
<html lang="ja">
  <head>
      <meta charset="UTF-8">
      <link href="index.css" rel="stylesheet" type="text/css" media="all">
      <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
      <script src="index.js"></script>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Detail | Ayaka Yabuki</title>
  </head>
  <body>
    <div id="header_fetch_target"></div>

    <div class="contents_fadein">
        <div class="bodybox">
            <h1>Archives</h1>

            <div class="center_contents media_container">
                <div class="swiper">
                    <div class="swiper-wrapper" id="media_slides">
                        </div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

            <div class="profile_sentence template_box">
                <ul style="display:flex; gap:10px; align-items:center; list-style:none; padding:0;">
                    <p id="detail_date" class="date"></p>
                    <p id="detail_category"></p>
                </ul>
                <h2 id="detail_title" class="lang_ja"></h2>
                <h2 id="detail_title_en" class="lang_en"></h2>

                <!-- A: 通常の記事表示エリア -->
                <div id="standard_content_wrapper">
                    <p id="detail_content" class="lang_ja" style="margin-top:25px;"></p>
                    <p id="detail_content_en" class="lang_en" style="margin-top:25px;"></p>
                </div>

                <!-- B: 【新設】特殊な動画ギャラリーエリア（最初は隠しておく） -->
                <div id="gallery_content_wrapper" style="display:none; margin-top:30px;">
                    <ul id="video_grid" class="archives_flex">
                        <!-- ここにJSで動画カードを生成します -->
                    </ul>
                </div>

                <!-- C: 【新設】動画再生用のモーダルウィンドウ（画面全体に被さる） -->
                <div id="video_modal">
                    <div class="modal_container">
                        <p onclick="closeModal()" class="close_btn">✕ Close</p>
                        <div id="modal_player" class="video_wrapper"></div>
                        <h2 id="modal_title" style="color: #fff;"></h2>
                    </div>
                </div>
                
                <p style="margin-top:40px;"><a href="archives.html"><< Back to Archives</a></p>
            </div>
        </div>
    </div>

    <div id="footer_fetch_target"></div>

    <script async src="//www.instagram.com/embed.js"></script>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const archivesId = urlParams.get('id');

    fetch('archives_data.json')
        .then(response => response.json())
        .then(data => {
            const item = data.find(p => p.id === archivesId);
            if (!item) return;

            // 1. 基本情報の表示（タイトル・日付など）
            document.getElementById('detail_date').innerText = item.date;
            document.getElementById('detail_title').innerText = item.title_ja;
            document.getElementById('detail_title_en').innerText = item.title_en;
            document.getElementById('detail_content').innerText = item.content_ja;
            document.getElementById('detail_content_en').innerText = item.content_en;

            // カテゴリクラス付与
            const catEl = document.getElementById('detail_category');
            if (catEl) catEl.className = item.category === 'category_mv' ? 'mv' : 'live';

            // エリアの取得
            const swiperArea = document.querySelector(".media_container");
            const standardContent = document.getElementById('standard_content_wrapper');
            const galleryContent = document.getElementById('gallery_content_wrapper');

            // 2. 記事タイプによる分岐処理
            if (item.type === "gallery" && item.video_list) {
                // --- 【動画ギャラリー形式】 ---
                if (swiperArea) swiperArea.style.display = "none";      // Swiperを隠す
                //if (standardContent) standardContent.style.display = "none"; // 通常本文を隠す
                if (galleryContent) galleryContent.style.display = "block";  // ギャラリーを表示

                // 本文の流し込み
                document.getElementById('detail_content').innerHTML = item.content_ja || "";
                document.getElementById('detail_content_en').innerHTML = item.content_en || "";

                const videoGrid = document.getElementById('video_grid');
                videoGrid.innerHTML = ""; // 初期化

                item.video_list.forEach(video => {
                    // YouTube IDの抽出 (URLから ID部分だけ抜き出す)
                    const videoId = video.url.includes('v=') ? video.url.split('v=')[1].split('&')[0] : video.url.split('/').pop().split('?')[0];
                    const videoTitle = video.title;
                    
                    // item.video_list.forEach 内の card 生成部分を差し替え
                    const card = `
                        <li class="archives_block" onclick="openModal('${videoId}', '${videoTitle}')" style="cursor:pointer;">
                            <div class="video_click_area"> <!-- aタグの代わりのラッパー -->
                                <img src="${video.thumb}" alt="${video.title}">
                            </div>
                            <p>${video.index}</p>
                        </li>`;
                    videoGrid.insertAdjacentHTML('beforeend', card);
                });
            } else {
                // --- 【通常形式】 ---
                if (swiperArea) swiperArea.style.display = "block";
                if (standardContent) standardContent.style.display = "block";
                if (galleryContent) galleryContent.style.display = "none";

                // 本文の流し込み
                document.getElementById('detail_content').innerHTML = item.content_ja || "";
                document.getElementById('detail_content_en').innerHTML = item.content_en || "";

                // Swiperの処理
                const slidesContainer = document.getElementById('media_slides');
                slidesContainer.innerHTML = ""; // 初期化

                const mediaSources = [
                    { type: 'url', val: item.url },
                    { type: 'url', val: item.url2 },
                    { type: 'img', val: item.image }
                ].filter(m => m.val);

                mediaSources.forEach(media => {
                    let content = "";
                    if (media.type === 'url') {
                        if (media.val.includes('youtube.com') || media.val.includes('youtu.be')) {
                            const vId = media.val.split('v=')[1] || media.val.split('/').pop().split('?')[0];
                            content = `<div class="video_wrapper"><iframe src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else if (media.val.includes('instagram.com')) {
                            const instaUrl = media.val.endsWith('/') ? media.val : media.val + '/';
                            content = `<div class="insta_container"><blockquote class="instagram-media" data-instgrm-permalink="${instaUrl}embed/" data-instgrm-version="14"></blockquote></div>`;
                        }
                    } else {
                        content = `<img src="${media.val}" alt="">`;
                    }
                    slidesContainer.insertAdjacentHTML('beforeend', `<div class="swiper-slide">${content}</div>`);
                });

                // Swiper初期化
                new Swiper('.swiper', {
                    loop: mediaSources.length > 1,
                    pagination: { el: '.swiper-pagination', clickable: true },
                    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                    autoHeight: false,
                });

                if (window.instgrm) window.instgrm.Embeds.process();
            }

            // 3. 言語適用の実行
            if (typeof applyLanguage === "function") {
                applyLanguage(lang, false);
            } else {
                const currentLang = localStorage.getItem('selectedLang') ? parseInt(localStorage.getItem('selectedLang')) : 0;
                const detJa = document.getElementById('detail_content');
                const detEn = document.getElementById('detail_content_en');
                if(detJa) detJa.style.display = (currentLang === 0) ? "block" : "none";
                if(detEn) detEn.style.display = (currentLang === 1) ? "block" : "none";
            }

            // フェードイン表示
            const contents = document.querySelector('.contents_fadein');
            if (contents) contents.style.opacity = 1;
        });

        // モーダル操作関数（fetchの外に置いておく）
        function openModal(videoId, videoTitle) {
            const modal = document.getElementById('video_modal');
            const player = document.getElementById('modal_player');
            const modalTitle = document.getElementById('modal_title');
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen style="width:100%; aspect-ratio:16/9;"></iframe>`;
            modalTitle.innerHTML = `${videoTitle}`;
            modal.style.display = "flex";
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('video_modal');
            modal.classList.remove('show');

            setTimeout(() => {
                modal.style.display = "none";
                document.getElementById('modal_player').innerHTML = "";
                document.getElementById('modal_title').innerHTML = "";
                document.body.style.overflow = '';
            }, 500);
        }
    </script>
  </body>
</html>
